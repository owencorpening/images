<svg width="680" height="360" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="360" fill="white"/>
<title>GWETC corridor cross-section</title>
<desc>Cross-section of the Global Water–Energy–Transport Corridor showing five integrated systems within a shared 330–660 ft right-of-way.</desc>
<style>
  text { font-family: Arial, sans-serif; fill: #2C2C2A; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .ann { font-size: 10px; font-weight: 400; fill: #3D3C39; }

  @media (forced-colors: active) {
    svg {
      background-color: Canvas !important;
      outline: 1px solid CanvasText;
      forced-color-adjust: none;
    }
    svg line, svg path, svg circle {
      stroke: CanvasText !important;
      stroke-width: 1.5px !important;
    }
    .power-line { stroke-dasharray: 4; }
    .row-border { stroke-dasharray: 2; stroke-width: 1px; }
    text { fill: CanvasText !important; font-weight: bold; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Ground surface -->
<rect x="40" y="220" width="600" height="8" rx="2" fill="#B4B2A9" opacity="0.9"/>
<rect x="40" y="228" width="600" height="132" rx="0" fill="#D3D1C7" opacity="0.5"/>

<!-- FLOATING ANNOTATION — subgrade, right of gas pipeline -->
<rect x="256" y="235" width="285" height="88" rx="4" fill="white" fill-opacity="0.92" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 2"/>
<text class="ann" x="266" y="250">GWETC cross-section showing the integrated</text>
<text class="ann" x="266" y="264">five-system architecture within a 330–660 ft</text>
<text class="ann" x="266" y="278">(100–200 m) engineered right-of-way.</text>
<text class="ann" x="266" y="292">All systems share surveying, grading, security,</text>
<text class="ann" x="266" y="306">and maintenance access.</text>

<!-- ROW boundary markers -->
<line class="row-border" x1="40" y1="160" x2="40" y2="360" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line class="row-border" x1="640" y1="160" x2="640" y2="360" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- ROW dimension line -->
<line class="row-border" x1="40" y1="155" x2="640" y2="155" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="340" y="148" text-anchor="middle" fill="#3D3C39">330–660 ft (100–200 m) engineered right-of-way</text>

<!-- ROW labels -->
<text class="ts" x="35" y="170" text-anchor="middle" fill="#888780">ROW</text>
<text class="ts" x="645" y="170" text-anchor="middle" fill="#888780">ROW</text>

<!-- SYSTEM 1: Water main -->
<ellipse cx="110" cy="290" rx="38" ry="38" fill="#A8CEF0" stroke="#185FA5" stroke-width="1.5"/>
<ellipse cx="110" cy="290" rx="28" ry="28" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.5"/>
<text class="th" x="110" y="287" text-anchor="middle" fill="#0C447C">Water</text>
<text class="ts" x="110" y="303" text-anchor="middle" fill="#0C447C">main</text>

<!-- SYSTEM 2: Gas pipeline -->
<ellipse cx="220" cy="290" rx="30" ry="30" fill="#F0C97A" stroke="#854F0B" stroke-width="1.5"/>
<ellipse cx="220" cy="290" rx="22" ry="22" fill="none" stroke="#854F0B" stroke-width="0.8" opacity="0.5"/>
<text class="th" x="220" y="287" text-anchor="middle" fill="#633806">Gas</text>
<text class="ts" x="220" y="303" text-anchor="middle" fill="#633806">pipeline</text>

<!-- SYSTEM 3: Rail -->
<rect x="295" y="215" width="100" height="12" rx="2" fill="#5DCAA5" opacity="0.8" stroke="#1D9E75" stroke-width="0.8"/>
<rect x="302" y="200" width="8" height="28" rx="2" fill="#1D9E75"/>
<rect x="380" y="200" width="8" height="28" rx="2" fill="#1D9E75"/>
<rect x="298" y="208" width="94" height="5" rx="1" fill="#085041" opacity="0.85"/>
<rect x="298" y="218" width="94" height="5" rx="1" fill="#085041" opacity="0.85"/>
<text class="th" x="345" y="188" text-anchor="middle" fill="#085041">Rail freight</text>

<!-- SYSTEM 4: Power transmission -->
<line class="power-line" x1="450" y1="220" x2="462" y2="140" stroke="#993C1D" stroke-width="2"/>
<line class="power-line" x1="500" y1="220" x2="488" y2="140" stroke="#993C1D" stroke-width="2"/>
<line class="power-line" x1="448" y1="155" x2="502" y2="155" stroke="#993C1D" stroke-width="2"/>
<line class="power-line" x1="475" y1="155" x2="475" y2="220" stroke="#993C1D" stroke-width="1.5"/>
<circle cx="448" cy="157" r="3" fill="#D85A30"/>
<circle cx="475" cy="142" r="3" fill="#D85A30"/>
<circle cx="502" cy="157" r="3" fill="#D85A30"/>
<line class="power-line" x1="40" y1="157" x2="448" y2="157" stroke="#D85A30" stroke-width="0.8" opacity="0.6"/>
<line class="power-line" x1="502" y1="157" x2="640" y2="157" stroke="#D85A30" stroke-width="0.8" opacity="0.6"/>
<line class="power-line" x1="40" y1="143" x2="475" y2="142" stroke="#D85A30" stroke-width="0.8" opacity="0.6"/>
<line class="power-line" x1="475" y1="142" x2="640" y2="142" stroke="#D85A30" stroke-width="0.8" opacity="0.6"/>
<text class="th" x="475" y="121" text-anchor="middle" fill="#712B13">Power</text>
<text class="ts" x="475" y="134" text-anchor="middle" fill="#993C1D">500 kV HVDC</text>

<!-- SYSTEM 5: Access road + fiber -->
<rect x="555" y="213" width="75" height="12" rx="2" fill="#888780" opacity="0.85" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="592" y1="213" x2="592" y2="225" stroke="white" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
<rect x="570" y="255" width="45" height="10" rx="3" fill="#3D3C39" opacity="0.6"/>
<text class="ts" x="592" y="263" text-anchor="middle" fill="white">fiber</text>
<text class="th" x="592" y="196" text-anchor="middle" fill="#444441">Road +</text>
<text class="ts" x="592" y="208" text-anchor="middle" fill="#3D3C39">fiber / SCADA</text>
</svg>
