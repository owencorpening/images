<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-weight: 600; }
      .sop-box { fill: #2c3e50; stroke: #34495e; stroke-width: 2; }
      .layer-box { fill: #ecf0f1; stroke: #95a5a6; stroke-width: 2; }
      .text-dark { fill: #2c3e50; }
      .text-light { fill: #ecf0f1; }
    </style>
  </defs>

  <!-- Title -->
  <text x="300" y="40" class="title text-dark" text-anchor="middle">Traditional Software Stack</text>

  <!-- SOP at top -->
  <rect x="150" y="70" width="300" height="60" class="sop-box" />
  <text x="300" y="105" class="label text-light" text-anchor="middle">SOP</text>
  <text x="300" y="120" class="label text-light" text-anchor="middle" font-size="12">(Specification)</text>

  <!-- Arrow down -->
  <line x1="300" y1="130" x2="300" y2="160" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- UI Design -->
  <rect x="80" y="160" width="440" height="80" class="layer-box" />
  <text x="300" y="200" class="label text-dark" text-anchor="middle">UI Design</text>
  <text x="300" y="218" class="label text-dark" text-anchor="middle" font-size="12">(Wireframes, mockups, design systems)</text>

  <!-- Arrow down -->
  <line x1="300" y1="240" x2="300" y2="270" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Development -->
  <rect x="80" y="270" width="440" height="80" class="layer-box" />
  <text x="300" y="310" class="label text-dark" text-anchor="middle">Development</text>
  <text x="300" y="328" class="label text-dark" text-anchor="middle" font-size="12">(HTML, CSS, JavaScript, conditionals)</text>

  <!-- Arrow down -->
  <line x1="300" y1="350" x2="300" y2="380" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Testing -->
  <rect x="80" y="380" width="440" height="80" class="layer-box" />
  <text x="300" y="420" class="label text-dark" text-anchor="middle">Testing</text>
  <text x="300" y="438" class="label text-dark" text-anchor="middle" font-size="12">(QA, validation, browser compatibility)</text>

  <!-- Arrow down -->
  <line x1="300" y1="460" x2="300" y2="490" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Training -->
  <rect x="80" y="490" width="440" height="80" class="layer-box" />
  <text x="300" y="530" class="label text-dark" text-anchor="middle">Training</text>
  <text x="300" y="548" class="label text-dark" text-anchor="middle" font-size="12">(Documentation, user guides, support)</text>

  <!-- Arrow down -->
  <line x1="300" y1="570" x2="300" y2="600" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Output -->
  <rect x="150" y="600" width="300" height="60" class="sop-box" />
  <text x="300" y="635" class="label text-light" text-anchor="middle">User-Facing Product</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#34495e" />
    </marker>
  </defs>

  <!-- Note -->
  <text x="300" y="690" class="label text-dark" text-anchor="middle" font-size="13" fill="#7f8c8d">Translation overhead: decades of roles, cycles, maintenance</text>
</svg>
