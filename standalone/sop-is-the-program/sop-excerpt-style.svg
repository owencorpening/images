<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .document { fill: #ffffff; stroke: #bdc3c7; stroke-width: 2; }
      .header { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; font-size: 12px; font-weight: 600; fill: #34495e; }
      .content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; font-size: 13px; fill: #2c3e50; line-height: 1.6; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #2c3e50; }
    </style>
  </defs>

  <!-- Title -->
  <text x="300" y="35" class="title" text-anchor="middle">SOP Executable by AI</text>

  <!-- Document -->
  <rect x="50" y="60" width="500" height="320" class="document" />

  <!-- Document header -->
  <rect x="50" y="60" width="500" height="40" fill="#ecf0f1" />
  <text x="70" y="85" class="header">BRANDING SOP</text>

  <!-- Content lines -->
  <text x="70" y="125" class="content">Header: [brand image], 700px,</text>
  <text x="80" y="143" class="content">before first `---`</text>

  <line x="70" y="160" x2="530" y2="160" stroke="#ecf0f1" stroke-width="1" />

  <text x="70" y="190" class="content">Footer: [brand asset], 400px,</text>
  <text x="80" y="208" class="content">above CTA text</text>

  <line x="70" y="225" x2="530" y2="225" stroke="#ecf0f1" stroke-width="1" />

  <text x="70" y="255" class="content">Never use the flat logo in articles —</text>
  <text x="80" y="273" class="content">reserved for app icons only.</text>

  <!-- Callout box -->
  <rect x="50" y="320" width="500" height="60" fill="#f0f7ff" stroke="#3498db" stroke-width="1" />
  <text x="300" y="345" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #2c3e50;" text-anchor="middle">AI reads this directly. No mockups. No design handoff.</text>
  <text x="300" y="365" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #2c3e50;" text-anchor="middle">Specification becomes execution.</text>
</svg>
