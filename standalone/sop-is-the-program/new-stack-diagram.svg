<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-weight: 600; }
      .element-box { fill: #27ae60; stroke: #229954; stroke-width: 2; }
      .text-light { fill: #ecf0f1; }
      .text-dark { fill: #2c3e50; }
    </style>
  </defs>

  <!-- Title -->
  <text x="300" y="40" class="title text-dark" text-anchor="middle">AI-Executable Stack</text>

  <!-- SOP -->
  <rect x="50" y="80" width="120" height="80" class="element-box" />
  <text x="110" y="125" class="label text-light" text-anchor="middle">SOP</text>

  <!-- Arrow -->
  <line x1="170" y1="120" x2="230" y2="120" stroke="#34495e" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- Runtime -->
  <rect x="230" y="80" width="140" height="80" class="element-box" />
  <text x="300" y="120" class="label text-light" text-anchor="middle">AI Runtime</text>
  <text x="300" y="135" class="label text-light" text-anchor="middle" font-size="12">(Claude, etc.)</text>

  <!-- Arrow -->
  <line x1="370" y1="120" x2="430" y2="120" stroke="#34495e" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- Output -->
  <rect x="430" y="80" width="120" height="80" class="element-box" />
  <text x="490" y="125" class="label text-light" text-anchor="middle">Output</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#34495e" />
    </marker>
  </defs>

  <!-- Callouts -->
  <text x="110" y="200" class="label text-dark" text-anchor="middle">Specification</text>
  <text x="110" y="220" class="label text-dark" text-anchor="middle" font-size="12">(load-bearing)</text>

  <text x="300" y="200" class="label text-dark" text-anchor="middle">Executor</text>
  <text x="300" y="220" class="label text-dark" text-anchor="middle" font-size="12">(swappable)</text>

  <text x="490" y="200" class="label text-dark" text-anchor="middle">Result</text>
  <text x="490" y="220" class="label text-dark" text-anchor="middle" font-size="12">(human reviewed)</text>

  <!-- Key insight -->
  <rect x="80" y="280" width="440" height="80" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" />
  <text x="300" y="310" class="label text-dark" text-anchor="middle">No interface layer.</text>
  <text x="300" y="335" class="label text-dark" text-anchor="middle">No translation overhead.</text>
  <text x="300" y="355" class="label text-dark" text-anchor="middle" font-size="12" fill="#7f8c8d">The SOP is the program.</text>
</svg>
